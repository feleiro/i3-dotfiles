set $cheatsheet ~/.config/i3/custom.d/cheatsheet.py
set $wallpaper_selection ~/.config/i3/custom.d/wallpaper_selection.sh


# Use pactl to adjust volume in PulseAudio.
# Используйте pactl для регулировки громкости в PulseAudio.
set $refresh_i3status killall -SIGUSR1 i3status

## Audio: Raise volume | Аудио: Увеличить громкость
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10% && $refresh_i3status
## Audio: Lower volume | Аудио: Уменьшить громкость
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10% && $refresh_i3status
## Audio: Mute/unmute speaker | Аудио: Вкл/выкл звук динамиков
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
## Audio: Mute/unmute microphone | Аудио: Вкл/выкл микрофон
bindsym XF86AudioMicMute exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status

# Use Mouse+$mod to drag floating windows to their wanted position
# Используйте Мышь+$mod для перемещения плавающих окон
floating_modifier $mod

# move tiling windows via drag & drop by left-clicking into the title bar,
# or left-clicking anywhere into the window while holding the floating modifier.
# Перемещайте плиточные окна перетаскиванием (ЛКМ по заголовку или ЛКМ+модификатор)
tiling_drag modifier titlebar

## Apps: Open terminal (Alacritty) | Приложения: Открыть терминал
bindsym $mod+Return exec alacritty

## Apps: Open file manager (Nemo) | Приложения: Открыть файловый менеджер (Dolphin)
bindsym $mod+e exec dolphin

## Window: Kill focused window | Окно: Закрыть активное окно
bindsym $mod+q kill

## Apps: Open application launcher (rofi) | Приложения: Запустить меню приложений (rofi)
bindcode $mod+40 exec "rofi -modi drun,run -show drun"

# change focus | Смена фокуса
## Focus: Move focus left | Фокус: Влево
bindsym $mod+j focus left
## Focus: Move focus down | Фокус: Вниз
bindsym $mod+k focus down
## Focus: Move focus up | Фокус: Вверх
bindsym $mod+l focus up
## Focus: Move focus right | Фокус: Вправо
bindsym $mod+semicolon focus right

# alternatively, you can use the cursor keys: | Альтернативно: клавиши стрелок
## Focus: Move focus left (arrows) | Фокус: Влево (стрелки)
bindsym $mod+Left focus left
## Focus: Move focus down (arrows) | Фокус: Вниз (стрелки)
bindsym $mod+Down focus down
## Focus: Move focus up (arrows) | Фокус: Вверх (стрелки)
bindsym $mod+Up focus up
## Focus: Move focus right (arrows) | Фокус: Вправо (стрелки)
bindsym $mod+Right focus right

# move focused window | Перемещение активного окна
## Window: Move window left | Окно: Сдвинуть влево
bindsym $mod+Shift+j move left
## Window: Move window down | Окно: Сдвинуть вниз
bindsym $mod+Shift+k move down
## Window: Move window up | Окно: Сдвинуть вверх
bindsym $mod+Shift+l move up
## Window: Move window right | Окно: Сдвинуть вправо
bindsym $mod+Shift+semicolon move right

# alternatively, you can use the cursor keys: | Альтернативно: клавиши стрелок
## Window: Move window left (arrows) | Окно: Сдвинуть влево (стрелки)
bindsym $mod+Shift+Left move left
## Window: Move window down (arrows) | Окно: Сдвинуть вниз (стрелки)
bindsym $mod+Shift+Down move down
## Window: Move window up (arrows) | Окно: Сдвинуть вверх (стрелки)
bindsym $mod+Shift+Up move up
## Window: Move window right (arrows) | Окно: Сдвинуть вправо (стрелки)
bindsym $mod+Shift+Right move right

# split in horizontal orientation | Разбить по горизонтали
## Layout: Split horizontally | Макет: Горизонтальное разделение
bindsym $mod+h split h

# split in vertical orientation | Разбить по вертикали
## Layout: Split vertically | Макет: Вертикальное разделение
bindsym $mod+v split v

# enter fullscreen mode for the focused container | Полноэкранный режим
## Window: Toggle fullscreen | Окно: Переключить полный экран
bindsym $mod+f fullscreen toggle

# change container layout (stacked, tabbed, toggle split) | Смена макета контейнера
## Layout: Stacked layout | Макет: Стек
bindsym $mod+Shift+s layout stacking
## Layout: Tabbed layout | Макет: Вкладки
bindsym $mod+Shift+w layout tabbed
## Layout: Toggle split layout | Макет: Переключить режим разделения
bindsym $mod+Shift+e layout toggle split

# toggle tiling / floating | Переключение плиточный/плавающий режим
## Window: Toggle floating | Окно: Переключить плавающий режим
bindsym $mod+Shift+space floating toggle

# change focus between tiling / floating windows | Фокус между типами окон
## Focus: Toggle focus between tiling and floating windows | Фокус: Переключить между плиткой и плавающими
bindsym $mod+Control+space focus mode_toggle

# focus the parent container | Фокус на родительский контейнер
## Focus: Parent container | Фокус: Родительский контейнер
bindsym $mod+a focus parent

# Define names for default workspaces | Определение имен рабочих столов
set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"

# switch to workspace | Переключение на рабочий стол
## Workspace: Switch to workspace 1 | Рабочий стол: Перейти на стол 1
bindsym $mod+1 workspace number $ws1
## Workspace: Switch to workspace 2 | Рабочий стол: Перейти на стол 2
bindsym $mod+2 workspace number $ws2
## Workspace: Switch to workspace 3 | Рабочий стол: Перейти на стол 3
bindsym $mod+3 workspace number $ws3
## Workspace: Switch to workspace 4 | Рабочий стол: Перейти на стол 4
bindsym $mod+4 workspace number $ws4
## Workspace: Switch to workspace 5 | Рабочий стол: Перейти на стол 5
bindsym $mod+5 workspace number $ws5
## Workspace: Switch to workspace 6 | Рабочий стол: Перейти на стол 6
bindsym $mod+6 workspace number $ws6
## Workspace: Switch to workspace 7 | Рабочий стол: Перейти на стол 7
bindsym $mod+7 workspace number $ws7
## Workspace: Switch to workspace 8 | Рабочий стол: Перейти на стол 8
bindsym $mod+8 workspace number $ws8
## Workspace: Switch to workspace 9 | Рабочий стол: Перейти на стол 9
bindsym $mod+9 workspace number $ws9
## Workspace: Switch to workspace 10 | Рабочий стол: Перейти на стол 10
bindsym $mod+0 workspace number $ws10

# move focused container to workspace | Перемещение окна на рабочий стол
## Workspace: Move window to workspace 1 | Рабочий стол: Переместить окно на стол 1
bindsym $mod+Shift+1 move container to workspace number $ws1
## Workspace: Move window to workspace 2 | Рабочий стол: Переместить окно на стол 2
bindsym $mod+Shift+2 move container to workspace number $ws2
## Workspace: Move window to workspace 3 | Рабочий стол: Переместить окно на стол 3
bindsym $mod+Shift+3 move container to workspace number $ws3
## Workspace: Move window to workspace 4 | Рабочий стол: Переместить окно на стол 4
bindsym $mod+Shift+4 move container to workspace number $ws4
## Workspace: Move window to workspace 5 | Рабочий стол: Переместить окно на стол 5
bindsym $mod+Shift+5 move container to workspace number $ws5
## Workspace: Move window to workspace 6 | Рабочий стол: Переместить окно на стол 6
bindsym $mod+Shift+6 move container to workspace number $ws6
## Workspace: Move window to workspace 7 | Рабочий стол: Переместить окно на стол 7
bindsym $mod+Shift+7 move container to workspace number $ws7
## Workspace: Move window to workspace 8 | Рабочий стол: Переместить окно на стол 8
bindsym $mod+Shift+8 move container to workspace number $ws8
## Workspace: Move window to workspace 9 | Рабочий стол: Переместить окно на стол 9
bindsym $mod+Shift+9 move container to workspace number $ws9
## Workspace: Move window to workspace 10 | Рабочий стол: Переместить окно на стол 10
bindsym $mod+Shift+0 move container to workspace number $ws10

# reload the configuration file | Перезагрузка файла конфигурации
## Config: Reload i3 config | Конфиг: Перезагрузить конфигурацию
bindsym $mod+Shift+c reload
# restart i3 inplace | Перезапуск i3 (сохраняет сессию)
## Config: Restart i3 | Конфиг: Перезапустить i3
bindsym $mod+Shift+r restart
# exit i3 (logs you out of your X session) | Выход из i3
## Session: Exit i3 (with confirmation) | Сессия: Выйти из i3 (с подтверждением)
bindsym $mod+m exec "i3-nagbar -t warning -m 'You pressed the exit shortcut. Do you really want to exit i3? This will end your X session.' -B 'Yes, exit i3' 'i3-msg exit'"

# resize window (you can also use the mouse for that) | Изменение размера окон
mode "resize" {
        # These bindings trigger as soon as you enter the resize mode
        # Эти привязки срабатывают при входе в режим resize

        ## Resize: Shrink width (j) | Размер: Сузить по ширине (j)
        bindsym j resize shrink width 10 px or 10 ppt
        ## Resize: Grow height (k) | Размер: Увеличить по высоте (k)
        bindsym k resize grow height 10 px or 10 ppt
        ## Resize: Shrink height (l) | Размер: Сузить по высоте (l)
        bindsym l resize shrink height 10 px or 10 ppt
        ## Resize: Grow width (semicolon) | Размер: Увеличить по ширине (;)
        bindsym semicolon resize grow width 10 px or 10 ppt

        # same bindings, but for the arrow keys | Те же действия, но для стрелок
        ## Resize: Shrink width (Left) | Размер: Сузить по ширине (Влево)
        bindsym Left resize shrink width 10 px or 10 ppt
        ## Resize: Grow height (Down) | Размер: Увеличить по высоте (Вниз)
        bindsym Down resize grow height 10 px or 10 ppt
        ## Resize: Shrink height (Up) | Размер: Сузить по высоте (Вверх)
        bindsym Up resize shrink height 10 px or 10 ppt
        ## Resize: Grow width (Right) | Размер: Увеличить по ширине (Вправо)
        bindsym Right resize grow width 10 px or 10 ppt

        # back to normal: Enter or Escape or $mod+r | Возврат в обычный режим
        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+r mode "default"
}

## Screen: Take screenshot of selected area and copy to clipboard | Экран: Сделать скриншот области в буфер обмена
bindsym $mod+Print exec --no-startup-id scrot -s /tmp/screenshot.png && xclip -selection clipboard -t image/png -i /tmp/screenshot.png && rm /tmp/screenshot.png

## Screen: Take screenshot of the whole screen and copy it to the clipboard | Экран: Сделать скриншт всего экрана и сохранить его в буфер обмена
bindsym Print exec --no-startup-id scrot /tmp/test.png && xclip -selection clipboard -t image/png -i /tmp/test.png && rm /tmp/test.png

## Wallpaper: Select wallpaper (custom script) | Обои: Выбрать обои (скрипт)
bindsym $mod+Control+t exec $wallpaper_selection

## Apps: Enable resize mode | Приложения: Включить режим изменения размера
bindsym $mod+r mode "resize"

## Other: Open terminal in config directory | Другое: Терминал в папке конфигурации
bindsym $mod+F1 exec alacritty --working-directory ~/.config/i3/config.d

## Other: Open keybind cheatsheet | Другое: Открыть шпаргалку по горячим клавишам
bindsym $mod+slash exec $cheatsheet

bindsym Mod1+F1 exec "rofi -modi drun,run -show drun"
