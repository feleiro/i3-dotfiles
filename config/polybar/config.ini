[colors]
include-file = ~/.cache/wal/colors-polybar.conf
background-alt = ${colors.color3}
primary = ${colors.color5}
secondary = ${colors.color1}
alert = ${colors.color2}
disabled = ${colors.color4}



[bar/example]
width = 100%
height = 28pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2

modules-left = xworkspaces xwindow
modules-right = pulseaudio backlight wlan eth memory cpu xkeyboard date battery systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL  "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/backlight]
type = internal/xbacklight
enable-scroll = true
label = %percentage%%
label-foreground = ${colors.foreground}
format-prefix = "BR "
format-prefix-foreground = ${colors.primary}


[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = disconected 
label-disconected-prefix = %ifname%
label-disconnected-foreground = ${colors.secondary}


[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %ifname% %essid%
label-connected-alt = %local_ip%
label-foreground = ${colors.color4} 

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %ifname%
label-connected-foreground = ${colors.foreground}
label-connected-alt = %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}


[module/battery]
type =  internal/battery

full-at = 99

low-at = 15

battery = BAT1

pull-interval = 5

time-format = %H:%M
label-charging = %percentage%
format-charging-prefix = "CHRG "
label-charging-foreground = ${colors.foreground}
format-charging-prefix-foreground = ${colors.primary}

label-discharging = %percentage%
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.primary}

label-low = %percentage%
label-low-foreground = ${colors.color1}
format-low-prefix = "LOW "
format-low-prefix-foreground = ${colors.alert}

label-full = FULL
label-full-foreground = ${colors.color3}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
